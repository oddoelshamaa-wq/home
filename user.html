<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشكول المحاسبة الشخصي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .tab-active { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .card-outside { border-right: 5px solid #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .card-mahmoud { border-right: 5px solid #a855f7; background: rgba(168, 85, 247, 0.05); }
        .card-paid { opacity: 0.3; filter: grayscale(1); border-right-color: #94a3b8 !important; }
        .badge-recurring { background: #10b981; color: white; font-size: 8px; padding: 2px 6px; border-radius: 10px; }
        .light-up { box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); border: 1px solid rgba(245, 158, 11, 0.4); }
    </style>
</head>
<body class="p-4 flex justify-center">

    <div id="app" class="w-full max-w-md">
        <!-- شاشة الدخول -->
        <div id="login-screen" class="glass p-8 mt-10 text-center">
            <h1 class="text-3xl font-bold mb-6 text-blue-400 italic font-serif">كشكولك 📒</h1>
            <input type="text" id="user-name" placeholder="الاسم" class="w-full p-4 rounded-xl bg-slate-900 mb-4 border border-white/10 outline-none focus:border-blue-500">
            <input type="tel" id="user-phone" placeholder="رقم التليفون" class="w-full p-4 rounded-xl bg-slate-900 mb-8 border border-white/10 outline-none focus:border-blue-500 text-center">
            <button onclick="login()" class="w-full py-4 bg-blue-600 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition">دخول الحساب</button>
        </div>

        <!-- الشاشة الرئيسية -->
        <div id="main-screen" class="hidden">
            <div class="flex justify-between items-center mb-6 px-2">
                <div><h2 class="text-xl font-bold text-blue-400" id="u-name"></h2><p class="text-[10px] opacity-50" id="u-phone"></p></div>
                <button onclick="logout()" class="text-xs bg-red-500/20 text-red-400 px-3 py-1 rounded-lg">خروج</button>
            </div>

            <!-- اختيار الشهر (مع منع المستقبل) -->
            <div class="glass p-4 mb-6 flex justify-between items-center bg-blue-500/5">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-white/5 rounded-full">◀</button>
                <div class="text-center"><p class="text-[10px] opacity-40">تاريخ السجل</p><h3 id="current-month-display" class="font-bold">---</h3></div>
                <button onclick="changeMonth(1)" id="next-month-btn" class="p-2 hover:bg-white/5 rounded-full">▶</button>
            </div>

            <div class="flex gap-2 mb-6 text-center">
                <button id="tab-mahmoud" onclick="switchTab('mahmoud')" class="flex-1 py-3 glass text-xs font-bold tab-active">👑 حساب محمود</button>
                <button id="tab-outside" onclick="switchTab('outside')" class="flex-1 py-3 glass text-xs font-bold">👤 ديون خارجية</button>
            </div>

            <div class="glass p-6 mb-8 text-center border-b-4 border-blue-500">
                <p id="stats-title" class="text-xs opacity-60 mb-1 italic">صافي الحساب</p>
                <p id="net-amount" class="text-5xl font-bold">0</p>
                <p id="stats-sub" class="text-[9px] mt-2 opacity-40 italic">--</p>
            </div>

            <div id="action-buttons" class="grid grid-cols-2 gap-3 mb-8"></div>
            <div id="ledger-list" class="space-y-4 pb-32 text-right"></div>
        </div>
    </div>

    <!-- نافذة المودال -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50">
        <div class="glass w-full max-w-sm p-6 text-right" dir="rtl">
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-center text-blue-300 font-serif"></h3>
            <label class="text-[10px] opacity-50">المبلغ</label>
            <input type="number" id="m-amount" placeholder="0" class="w-full p-4 rounded-xl bg-slate-900 mb-4 text-center text-3xl font-bold border border-white/10 outline-none">
            <label class="text-[10px] opacity-50">البيان (ديون إيه؟)</label>
            <input type="text" id="m-note" placeholder="مثلاً: قسط الجمعية" class="w-full p-4 rounded-xl bg-slate-900 mb-4 border border-white/10 outline-none">
            
            <div id="recurring-option" class="hidden flex items-center gap-3 mb-8 bg-white/5 p-4 rounded-xl border border-white/5">
                <input type="checkbox" id="m-recurring" class="w-6 h-6 rounded-md">
                <label for="m-recurring" class="text-xs text-emerald-400 font-bold leading-tight">دين شهري (يتكرر كل شهر جديد كأنه مادفعش)</label>
            </div>

            <div class="flex gap-3">
                <button onclick="saveData()" class="flex-1 py-4 bg-blue-600 rounded-2xl font-bold shadow-lg">حفظ السجل</button>
                <button onclick="closeModal()" class="flex-1 py-4 bg-white/5 rounded-2xl text-gray-400">إلغاء</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC-WunzZkXYOeXNAKtFgnti0suXbvU74FY",
        authDomain: "stoer-elshamaa.firebaseapp.com",
        projectId: "stoer-elshamaa",
        storageBucket: "stoer-elshamaa.firebasestorage.app",
        messagingSenderId: "566386579692",
        appId: "1:566386579692:web:c8b293e634b5cb62c5adc9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let user = JSON.parse(localStorage.getItem('kashkoul_user'));
    let activeTab = 'mahmoud', viewDate = new Date(), modalMode = '';

    window.login = () => {
        const name = document.getElementById('user-name').value.trim();
        const phone = document.getElementById('user-phone').value.trim();
        if(name && phone) { user = { name, phone }; localStorage.setItem('kashkoul_user', JSON.stringify(user)); location.reload(); }
    };

    if(user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        document.getElementById('u-name').innerText = user.name;
        document.getElementById('u-phone').innerText = "📞 " + user.phone;
        renderMonth(); listenToData();
    }

    // منع شهور المستقبل
    window.changeMonth = (val) => { 
        let nextDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + val, 1);
        let now = new Date();
        if (nextDate > new Date(now.getFullYear(), now.getMonth(), 1)) {
            alert("لا يمكنك استباق الزمن! سجلات المستقبل غير متوفرة بعد.");
            return;
        }
        viewDate = nextDate;
        renderMonth(); listenToData(); 
    };

    function renderMonth() { 
        document.getElementById('current-month-display').innerText = viewDate.toLocaleString('ar-EG', { month: 'long', year: 'numeric' }); 
    }

    window.switchTab = (tab) => { 
        activeTab = tab; 
        document.getElementById('tab-mahmoud').classList.toggle('tab-active', tab === 'mahmoud');
        document.getElementById('tab-outside').classList.toggle('tab-active', tab === 'outside');
        listenToData(); 
    };

    window.openModal = (mode) => {
        modalMode = mode;
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('m-recurring').checked = false;
        if (activeTab === 'outside') {
            document.getElementById('modal-title').innerText = "إضافة دين بره محمود";
            document.getElementById('recurring-option').classList.remove('hidden');
        } else {
            document.getElementById('modal-title').innerText = (mode === 'loan' ? "طلب سلفة" : mode === 'shehta' ? "طلب شحاتة" : "سداد مبلغ");
            document.getElementById('recurring-option').classList.add('hidden');
        }
    };

    window.closeModal = () => document.getElementById('modal').classList.add('hidden');

    window.saveData = async () => {
        const amount = parseFloat(document.getElementById('m-amount').value);
        const note = document.getElementById('m-note').value.trim();
        const isRecurring = document.getElementById('m-recurring').checked;
        if(!amount || !note) return;

        const month_id = viewDate.getMonth() + "-" + viewDate.getFullYear();
        let type = (activeTab === 'outside') ? 'outside' : modalMode;

        await addDoc(collection(db, "kashkoul_v3"), {
            user: user.name, phone: user.phone, amount, note, type,
            status: (type === 'outside' ? 'approved' : 'waiting'),
            paid: false, 
            is_recurring: isRecurring,
            paid_months: [], // مصفوفة لتخزين الشهور التي تم فيها السداد (للدين الشهري)
            date: new Date().getTime(),
            month_id: month_id
        });
        closeModal();
    };

    function listenToData() {
        const current_month_id = viewDate.getMonth() + "-" + viewDate.getFullYear();
        const buttons = document.getElementById('action-buttons');
        const list = document.getElementById('ledger-list');
        
        if (activeTab === 'mahmoud') {
            buttons.innerHTML = `
                <button onclick="openModal('loan')" class="glass p-4 text-[11px] font-bold border-red-500/30 text-red-400">طلب سلفة<br>(دين عليك)</button>
                <button onclick="openModal('shehta')" class="glass p-4 text-[11px] font-bold border-emerald-500/30 text-emerald-400">طلب شحاتة<br>(رصيد ليك)</button>
                <button onclick="openModal('pay')" class="glass p-4 text-[11px] font-bold border-blue-500/30 text-blue-400 col-span-2">سداد لمحمود</button>`;
            document.getElementById('stats-title').innerText = "صافي حسابك مع محمود";
            document.getElementById('stats-sub').innerText = "(الشحاتة + السداد) - السلف";
        } else {
            buttons.innerHTML = `<button onclick="openModal('outside')" class="glass p-4 font-bold border-orange-500/30 text-orange-400 col-span-2">+ إضافة دين بره محمود</button>`;
            document.getElementById('stats-title').innerText = "ديون خارجية متبقية";
            document.getElementById('stats-sub').innerText = "المبالغ المرحلة والمكررة المطلوب سدادها";
        }

        const q = (activeTab === 'mahmoud') 
            ? query(collection(db, "kashkoul_v3"), where("phone", "==", user.phone), where("month_id", "==", current_month_id))
            : query(collection(db, "kashkoul_v3"), where("phone", "==", user.phone), where("type", "==", "outside"));

        onSnapshot(q, (snap) => {
            list.innerHTML = '';
            let balance = 0;
            const items = [];

            snap.forEach(d => {
                const item = { id: d.id, ...d.data() };
                if (activeTab === 'mahmoud') {
                    if (item.type === 'outside') return;
                    if (item.status === 'approved') {
                        if (item.type === 'loan') balance -= item.amount;
                        else balance += item.amount;
                    }
                    items.push(item);
                } else {
                    const itemMonth = parseInt(item.month_id.split('-')[0]);
                    const itemYear = parseInt(item.month_id.split('-')[1]);
                    const viewMonth = viewDate.getMonth();
                    const viewYear = viewDate.getFullYear();

                    const isSameMonth = item.month_id === current_month_id;
                    const isPastUnpaid = (!item.paid && !item.is_recurring && (itemYear < viewYear || (itemYear === viewYear && itemMonth < viewMonth)));
                    const isRecurring = item.is_recurring;

                    // المنطق: هل يظهر في هذا الشهر؟
                    if (isSameMonth || isPastUnpaid || isRecurring) {
                        // التحقق هل هو مدفوع في هذا الشهر بالذات (للدين المتكرر)
                        let isPaidInThisMonth = item.is_recurring ? item.paid_months?.includes(current_month_id) : item.paid;
                        
                        if (!isPaidInThisMonth) balance += item.amount;
                        items.push({ ...item, isPaidThisMonth: isPaidInThisMonth });
                    }
                }
            });

            items.sort((a,b) => b.date - a.date).forEach(item => {
                const card = document.createElement('div');
                let isPositive = (item.type === 'shehta' || item.type === 'pay');
                let isActuallyPaid = (activeTab === 'outside') ? item.isPaidThisMonth : item.paid;
                
                let cardColor = isPositive ? 'card-shehta' : (item.type === 'outside' ? 'card-outside' : 'card-mahmoud');
                if (isActuallyPaid) cardColor += ' card-paid';
                else if (activeTab === 'outside') cardColor += ' light-up'; // ينور لو مادفعش

                card.className = `p-5 glass flex justify-between items-center mb-4 ${cardColor}`;
                
                let statusMsg = isActuallyPaid ? "✅ تم الدفع" : (item.status === 'waiting' ? "⏳ انتظار" : "📌 متبقي");
                
                card.innerHTML = `
                    <div class="text-right">
                        <p class="font-bold text-sm">${item.note} ${item.is_recurring ? '<span class="badge-recurring">شهري</span>' : ''}</p>
                        <span class="text-[10px] opacity-70">${statusMsg}</span>
                    </div>
                    <div class="text-left font-bold text-lg ${isPositive ? 'text-emerald-400' : 'text-red-400'}">
                        ${isPositive ? '+' : '-'} ${item.amount} ج
                        ${(!isActuallyPaid && item.type === 'outside') ? `<br><button onclick="togglePayOutside('${item.id}', true, '${current_month_id}', ${item.is_recurring})" class="bg-emerald-600 text-white text-[9px] px-3 py-1 rounded-lg mt-2 shadow-lg">تم الدفع</button>` : ''}
                        ${(isActuallyPaid && item.type === 'outside') ? `<br><button onclick="togglePayOutside('${item.id}', false, '${current_month_id}', ${item.is_recurring})" class="bg-slate-700 text-white text-[9px] px-3 py-1 rounded-lg mt-2">تراجع</button>` : ''}
                        ${(!isActuallyPaid && item.status === 'approved' && item.type === 'loan') ? `<br><button onclick="requestPay('${item.id}')" class="bg-blue-600 text-white text-[9px] px-3 py-1 rounded-lg mt-2 shadow-lg">سددت؟</button>` : ''}
                    </div>`;
                list.appendChild(card);
            });

            const netDisplay = document.getElementById('net-amount');
            netDisplay.innerText = balance + " ج";
            netDisplay.className = `text-5xl font-bold ${balance >= 0 ? (activeTab==='outside'?'text-orange-400':'text-emerald-400') : 'text-red-400'}`;
        });
    }

    window.togglePayOutside = async (id, status, month_id, isRecurring) => {
        const itemRef = doc(db, "kashkoul_v3", id);
        if (isRecurring) {
            // لو دين شهري، بنضيف أو بنشيل "الشهر ده" من قائمة الشهور المدفوعة
            await updateDoc(itemRef, {
                paid_months: status ? arrayUnion(month_id) : arrayRemove(month_id)
            });
        } else {
            // لو دين عادي، بنغير حالة الدفع العامة
            await updateDoc(itemRef, { paid: status });
        }
    };

    window.requestPay = async (id) => { await updateDoc(doc(db, "kashkoul_v3", id), { status: 'waiting_pay_confirm' }); };
    window.logout = () => { localStorage.clear(); location.reload(); };
</script>
</body>
</html>
